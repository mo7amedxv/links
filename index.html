<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moaz Social Links</title>
    <style>
      /* تصفير الهوامش الأساسية */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* خلفية الصفحة بالكامل */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        padding: 20px;
      }

      /* كارت الملف الشخصي */
      .profile-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px); /* تأثير الزجاج */
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }

      /* الصورة الشخصية (مربوطة بجيت هب بتاعك) */
      .profile-pic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid #14b8a6; /* إطار بنفس لون الموقع */
        margin-bottom: 15px;
        object-fit: cover;
        padding: 3px;
      }

      .name {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 5px;
        letter-spacing: 1px;
      }

      .title {
        font-size: 15px;
        color: #cbd5e1;
        margin-bottom: 30px;
      }

      /* حاوية الروابط */
      .links-wrapper {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* تنسيق الزراير */
      .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.07);
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid transparent;
        position: relative;
        overflow: hidden;
      }

      .link-btn svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
      }

      /* تأثيرات عند الوقوف بالماوس */
      .link-btn:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .link-btn.website:hover {
        border-color: #14b8a6;
        color: #14b8a6;
      }

      .link-btn.youtube:hover {
        border-color: #ff0000;
        color: #ff0000;
      }

      .link-btn.discord:hover {
        border-color: #5865f2;
        color: #5865f2;
      }
    </style>
  </head>
